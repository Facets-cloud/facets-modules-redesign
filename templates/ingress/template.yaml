name: ingress
displayName: NGINX Gateway Fabric Ingress
description: >
  NGINX Gateway Fabric ingress for AWS. TLS-terminated Gateway API
  based ingress on top of an existing EKS cluster with a node pool,
  cert-manager, and Gateway API CRDs already in place. Apply the
  cert-manager and gateway-api-crd templates first if your project
  doesn't already have them.
category: network
version: "1.0"
tags: [ingress, gateway-api, nginx, tls]
maintainers:
  - name: Facets
resources:
  - gateway-ing.json
requires:
  - kubernetes_cluster/cluster
  - kubernetes_node_pool/nodepool
  - cert_manager/cert-manager
  - gateway_api_crd/gateway-api-crd
source:
  gitUrl: https://github.com/Facets-cloud/facets-modules-redesign.git
  gitRef: main
  path: templates/ingress
