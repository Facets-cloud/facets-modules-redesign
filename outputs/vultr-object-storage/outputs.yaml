name: "@facets/vultr-object-storage"
title: "Vultr Object Storage"
description: "Vultr S3-compatible object storage subscription with access credentials"
properties:
  type: object
  properties:
    attributes:
      type: object
      properties:
        object_storage_id:
          type: string
          description: "Vultr object storage subscription ID"
        label:
          type: string
          description: "Object storage label/name"
        region:
          type: string
          description: "Vultr region where the object storage is located"
        cluster_id:
          type: string
          description: "Vultr object storage cluster ID"
        s3_endpoint:
          type: string
          description: "S3-compatible endpoint hostname"
        s3_url:
          type: string
          description: "Direct S3 endpoint URL"
        access_key:
          type: string
          description: "S3-compatible access key"
        secret_key:
          type: string
          description: "S3-compatible secret key"
        secrets:
          type: array
          items:
            type: string
          description: "List of secret field names"
    interfaces:
      type: object
      properties: {}
providers: []
