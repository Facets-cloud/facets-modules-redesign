name: '@facets/aws_kms'
properties:
  type: object
  properties:
    attributes:
      type: object
      properties:
        kms_key_arn:
          type: string
          description: The Amazon Resource Name (ARN) of the KMS key
        kms_key_id:
          type: string
          description: The globally unique identifier for the key
        kms_key_region:
          type: string
          description: The AWS region where the key is located
        kms_key_policy:
          type: string
          description: The IAM resource policy set on the key
        kms_aliases:
          type: object
          description: Map of aliases created for the key
        kms_external_key_expiration_model:
          type: string
          description: Key material expiration model for external keys
        kms_external_key_state:
          type: string
          description: The state of the CMK for external keys
        kms_external_key_usage:
          type: string
          description: The cryptographic operations for which the CMK can be used
        kms_grants:
          type: object
          description: Map of grants created for the key
    interfaces:
      type: object
      properties: {}
providers: []
