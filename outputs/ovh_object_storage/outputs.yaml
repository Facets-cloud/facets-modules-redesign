name: "@facets/ovh-object-storage"
title: "Object Storage Container"
description: "OVH object storage container with S3-compatible access credentials"
properties:
  type: object
  properties:
    attributes:
      type: object
      properties:
        container_id:
          type: string
          description: "OVH container ID"
        container_name:
          type: string
          description: "Container name"
        region:
          type: string
          description: "OVH region where container is located"
        s3_endpoint:
          type: string
          description: "S3-compatible endpoint URL"
        container_url:
          type: string
          description: "Direct container access URL"
        access_key:
          type: string
          description: "S3-compatible access key"
        secret_key:
          type: string
          description: "S3-compatible secret key"
        secrets:
          type: array
          items:
            type: string
          description: "List of secret field names"
    interfaces:
      type: object
      description: "No interfaces defined for object storage"
providers: []
