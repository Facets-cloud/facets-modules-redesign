      x-ui-toggle: true
    query_timeout:
      default: 60
      description: Query timeout in seconds
      minimum: 10
      title: Query Timeout
      type: integer
    loki_custom_values:
      default: {}
      description: Additional Helm values for loki-distributed chart (merged last, highest priority)
      title: Loki Custom Values
      type: object
      x-ui-yaml-editor: true
    promtail_custom_values:
      default: {}
