              title: Replicas
              type: integer
            requests:
              description: Resource requests
              properties:
                cpu:
                  default: "125m"
                  description: CPU request
                  title: CPU
                  type: string
                memory:
                  default: "128Mi"
                  description: Memory request
                  title: Memory
