            limits:
              description: Resource limits
              properties:
                cpu:
                  default: "500m"
                  description: CPU limit
                  title: CPU
                  type: string
                memory:
                  default: "512Mi"
                  description: Memory limit
                  title: Memory
                  type: string
              title: Limits
              type: object
              x-ui-order:
                - cpu
                - memory
          title: Querier
          type: object
          x-ui-order:
            - replicas
            - requests
            - limits
        query_frontend:
          description: Query frontend component resources
          properties:
            replicas:
              default: 1
              description: Number of query frontend replicas
