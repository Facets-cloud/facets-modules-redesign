intent: object_storage
flavor: vultr
version: "1.0"
clouds:
  - kubernetes
description: S3-compatible object storage subscription on Vultr with access credentials
intentDetails:
  type: Cloud & Infrastructure
  description: S3-compatible object storage on Vultr
  displayName: Object Storage
  iconUrl: https://raw.githubusercontent.com/Facets-cloud/facets-modules-redesign/main/icons/object_storage.svg
spec:
  title: Vultr Object Storage
  description: S3-compatible object storage subscription for storing unstructured data on Vultr
  type: object
  x-ui-order:
    - region
    - tier_id
  properties:
    region:
      type: string
      title: Region
      description: Vultr object storage region (selects the object storage cluster, e.g. ewr, ord, ams)
      default: ewr
      x-ui-placeholder: ewr
      x-ui-overrides-only: true
    tier_id:
      type: integer
      title: Storage Tier
      description: Vultr object storage tier ID (1 = Standard). List tiers via the Vultr API (GET /v2/object-storage/tiers).
      default: 1
  required:
    - region
inputs:
  vultr_cloud_account:
    type: "@facets/vultr_cloud_account"
    optional: false
    displayName: Vultr Cloud Account
    description: Vultr provider configuration
    providers:
      - vultr
outputs:
  default:
    type: "@facets/vultr-object-storage"
    title: Vultr Object Storage
sample:
  kind: object_storage
  flavor: vultr
  version: "1.0"
  disabled: true
  spec:
    region: ewr
    tier_id: 1
iac:
  validated_files:
    - main.tf
    - variables.tf
    - outputs.tf
    - versions.tf
