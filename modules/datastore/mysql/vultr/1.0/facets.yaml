intent: mysql
flavor: vultr
version: "1.0"
clouds:
  - kubernetes
description: Managed MySQL database on Vultr with SSL/TLS and trusted-IP allow-listing
intentDetails:
  type: Datastores
  description: Vultr managed MySQL database service
  displayName: MySQL
  iconUrl: https://raw.githubusercontent.com/Facets-cloud/facets-modules-redesign/main/icons/mysql.svg
spec:
  title: Vultr Managed MySQL Database
  description: Managed MySQL database on Vultr
  type: object
  x-ui-order:
    - version_config
    - sizing
    - advanced_config
    - network_access
  properties:
    version_config:
      type: object
      title: Version Configuration
      x-ui-order:
        - version
      properties:
        version:
          type: string
          title: MySQL Version
          description: MySQL engine major version
          enum:
            - "8"
            - "8.4"
          default: "8"
      required:
        - version
    sizing:
      type: object
      title: Sizing & Performance
      x-ui-order:
        - plan
      properties:
        plan:
          type: string
          title: Database Plan
          description: "Vultr managed database plan slug (encodes vCPU/RAM/node count, e.g. vultr-dbaas-hobbyist-cc-1-25-1). List plans via the Vultr API (GET /v2/databases/plans)."
          default: vultr-dbaas-hobbyist-cc-1-25-1
          x-ui-placeholder: vultr-dbaas-hobbyist-cc-1-25-1
      required:
        - plan
    advanced_config:
      type: object
      title: Advanced Configuration
      x-ui-toggle: true
      properties:
        slow_query_log:
          type: boolean
          title: Slow Query Log
          description: Enable the MySQL slow query log
          default: false
        long_query_time:
          type: integer
          title: Long Query Time (seconds)
          description: Queries slower than this are logged (only applies when slow query log is enabled)
          minimum: 1
          maximum: 3600
          default: 10
        require_primary_key:
          type: boolean
          title: Require Primary Key
          description: Reject tables created without a primary key
          default: false
    network_access:
      type: object
      title: Network Access
      properties:
        trusted_ips:
          type: array
          title: Trusted IPs
          description: List of CIDRs permitted to connect (empty denies all external access)
          default: []
          items:
            type: string
            pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$
      required: []
  required:
    - version_config
    - sizing
inputs:
  vultr_cloud_account:
    type: "@facets/vultr_cloud_account"
    optional: false
    displayName: Vultr Cloud Account
    description: Vultr provider configuration and default region
    providers:
      - vultr
  network:
    type: "@facets/vultr-vpc-details"
    optional: true
    displayName: VPC Network
    description: Optional VPC for private connectivity; when wired the database is attached via vpc_id
    providers: []
outputs:
  default:
    type: "@facets/mysql"
    title: Vultr MySQL Database
sample:
  kind: mysql
  flavor: vultr
  version: "1.0"
  disabled: true
  spec:
    version_config:
      version: "8"
    sizing:
      plan: vultr-dbaas-hobbyist-cc-1-25-1
    advanced_config:
      slow_query_log: false
      long_query_time: 10
      require_primary_key: false
    network_access:
      trusted_ips: []
iac:
  validated_files:
    - main.tf
    - variables.tf
    - outputs.tf
    - versions.tf
