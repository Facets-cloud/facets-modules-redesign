intent: ingress
flavor: nginx_fabric
version: '1.0'
description: NGINX Gateway Fabric - Kubernetes Gateway API implementation
clouds:
- aws
- azure
- gcp
- kubernetes
inputs:
  kubernetes_details:
    optional: false
    type: '@facets/kubernetes-details'
    displayName: Kubernetes Cluster
    default:
      resource_type: kubernetes_cluster
      resource_name: default
    providers:
    - kubernetes
    - kubernetes-alpha
    - helm
  kubernetes_node_pool_details:
    type: '@facets/kubernetes_nodepool'
    displayName: Node Pool
    optional: true
  artifactories:
    type: '@facets/artifactories'
    displayName: Container Registries
    optional: true
    default:
      resource_type: artifactories
      resource_name: default
  cert_manager_details:
    type: '@facets/cert_manager'
    optional: true
    default:
      resource_type: cert_manager
      resource_name: default
    displayName: Certificate Manager
    description: Certificate Manager configuration for TLS certificate management
spec:
  title: NGINX Gateway Fabric
  type: object
  properties:
    basic_auth:
      type: boolean
      title: Basic Authentication
      description: Enable/disable basic auth for all routes
      default: false
    private:
      type: boolean
      title: Private Load Balancer
      description: Set load balancer as private/internal
    disable_base_domain:
      type: boolean
      title: Disable Base Domain
      description: Disable automatic creation of base domain for this gateway
      default: false
    gateway_class_name:
      type: string
      title: Gateway Class Name
      description: Name of the GatewayClass resource (optional, defaults to instance name)
    resources:
      type: object
      title: Controller Resources
      description: Configure resource limits and requests for the gateway controller
      x-ui-toggle: true
      properties:
        requests:
          type: object
          title: Resource Requests
          description: Minimum resource requirements for the controller
          properties:
            cpu:
              type: string
              title: CPU Request
              description: Minimum CPU requirement (e.g., 100m, 1, 500m)
              pattern: ^([0-9]*\.?[0-9]+m?|[0-9]+)$
              x-ui-error-message: Value must be a valid CPU specification (e.g., 100m,
                1, 500m)
              x-ui-placeholder: 100m
            memory:
              type: string
              title: Memory Request
              description: Minimum memory requirement (e.g., 200Mi, 1Gi, 512Mi)
              pattern: ^[0-9]+(\.[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$
              x-ui-error-message: Value must be a valid memory specification (e.g.,
                200Mi, 1Gi)
              x-ui-placeholder: 200Mi
        limits:
          type: object
          title: Resource Limits
          description: Maximum resource limits for the controller
          properties:
            cpu:
              type: string
              title: CPU Limit
              description: Maximum CPU allowed (e.g., 1, 2, 500m)
              pattern: ^([0-9]*\.?[0-9]+m?|[0-9]+)$
              x-ui-error-message: Value must be a valid CPU specification (e.g., 1,
                2, 500m)
              x-ui-placeholder: '1'
            memory:
              type: string
              title: Memory Limit
              description: Maximum memory allowed (e.g., 1Gi, 2Gi, 512Mi)
              pattern: ^[0-9]+(\.[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$
              x-ui-error-message: Value must be a valid memory specification (e.g.,
                1Gi, 2Gi)
              x-ui-placeholder: 1Gi
    domains:
      title: Domains
      description: Map of domain configurations
      type: object
      x-ui-overrides-only: true
      patternProperties:
        ^[a-zA-Z0-9_.-]*$:
          title: Domain Object
          description: Domain configuration
          type: object
          properties:
            domain:
              type: string
              title: Domain
              description: Host name of the domain
              pattern: ^[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?(\.[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?)*\.[A-Za-z]{2,6}$
              x-ui-unique: true
              x-ui-placeholder: 'Domain to map gateway. Eg: example.com, sub.example.com'
              x-ui-error-message: 'Value doesn''t match the format. Eg: example.com'
            alias:
              type: string
              title: Alias
              description: Alias for the domain
            custom_tls:
              type: object
              title: Custom TLS Configuration
              description: Provide custom SSL certificate and private key for this domain
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable Custom TLS
                  description: Enable custom TLS certificate instead of cert-manager
                    managed certificates
                  default: false
                certificate:
                  type: string
                  title: TLS Certificate
                  description: TLS certificate (PEM format)
                  x-ui-secret-ref: true
                  x-ui-visible-if:
                    field: spec.domains.{{this}}.custom_tls.enabled
                    values:
                    - true
                private_key:
                  type: string
                  title: TLS Private Key
                  description: TLS private key (PEM format)
                  x-ui-secret-ref: true
                  x-ui-visible-if:
                    field: spec.domains.{{this}}.custom_tls.enabled
                    values:
                    - true
              required:
              - enabled
          required:
          - domain
          - alias
    rules:
      title: Routing Rules
      description: Gateway API routing configurations (HTTP and gRPC)

      type: object
      patternProperties:
        ^[a-zA-Z0-9_.-]*$:
          title: Route Object
          description: HTTP route configuration
          type: object
          properties:
            disable:
              type: boolean
              title: Disable Route
              description: Enable/Disable this route
            domain_prefix:
              type: string
              title: Domain Prefix
              description: Subdomain prefix
              pattern: ^[a-z0-9]([a-z0-9-]{0,34}[a-z0-9])?$|^[a-z0-9]$
              x-ui-placeholder: Enter the subdomain prefix
              x-ui-error-message: Max 36 characters, only hyphens allowed, cannot start/end with hyphen
            service_name:
              type: string
              title: Service Name
              description: Kubernetes service name
              x-ui-api-source:
                endpoint: /cc-ui/v1/dropdown/stack/{{stackName}}/resources-info
                method: GET
                params:
                  includeContent: false
                labelKey: resourceName
                valueKey: resourceName
                valueTemplate: ${service.{{value}}.out.attributes.service_name}
                filterConditions:
                - field: resourceType
                  value: service
              x-ui-typeable: true
            namespace:
              type: string
              title: Service Namespace
              description: Kubernetes service namespace
              x-ui-api-source:
                endpoint: /cc-ui/v1/dropdown/stack/{{stackName}}/resources-info
                method: GET
                params:
                  includeContent: false
                labelKey: resourceName
                valueKey: resourceName
                valueTemplate: ${service.{{value}}.out.attributes.namespace}
                filterConditions:
                - field: resourceType
                  value: service
              x-ui-typeable: true
            port:
              type: string
              title: Port
              description: Service port number
              x-ui-api-source:
                endpoint: /cc-ui/v1/dropdown/stack/{{stackName}}/service/{{serviceName}}/overview
                dynamicProperties:
                  serviceName:
                    key: service_name
                    lookup: regex
                    x-ui-lookup-regex: \${[^.]+\.([^.]+).*
                method: GET
                labelKey: port
                valueKey: port
                path: ports
              x-ui-typeable: true
            path:
              type: string
              title: Path
              description: Path of the application
              pattern: ^(/[^/]+)*(/)?$
              x-ui-placeholder: Enter path (e.g., / or /api)
              x-ui-error-message: 'Value doesn''t match pattern, eg: / or /api'
            path_type:
              type: string
              title: Path Type
              description: Path matching type
              enum:
              - Exact
              - PathPrefix
              - RegularExpression
              default: PathPrefix
            header_matches:
              type: array
              title: Header-Based Routing
              description: Route traffic based on HTTP headers
              x-ui-toggle: true
              items:
                type: object
                title: Header Match
                properties:
                  name:
                    type: string
                    title: Header Name
                    description: HTTP header name (e.g., X-Version, User-Agent)
                  value:
                    type: string
                    title: Header Value
                    description: Header value to match
                  type:
                    type: string
                    title: Match Type
                    enum:
                    - Exact
                    - RegularExpression
                    default: Exact
            request_header_modifier:
              type: object
              title: Request Header Modification
              description: Modify request headers
              x-ui-toggle: true
              properties:
                add:
                  type: object
                  title: Add Headers
                  description: Headers to add to requests
                  x-ui-yaml-editor: true
                set:
                  type: object
                  title: Set Headers
                  description: Headers to set (override) in requests
                  x-ui-yaml-editor: true
                remove:
                  type: array
                  title: Remove Headers
                  description: Header names to remove from requests
                  items:
                    type: string
            response_header_modifier:
              type: object
              title: Response Header Modification
              description: Modify response headers
              x-ui-toggle: true
              properties:
                add:
                  type: object
                  title: Add Headers
                  description: Headers to add to responses
                  x-ui-yaml-editor: true
                set:
                  type: object
                  title: Set Headers
                  description: Headers to set (override) in responses
                  x-ui-yaml-editor: true
                remove:
                  type: array
                  title: Remove Headers
                  description: Header names to remove from responses
                  items:
                    type: string
            url_rewrite:
              type: object
              title: URL Rewriting
              description: Rewrite request URLs
              x-ui-toggle: true
              properties:
                hostname:
                  type: string
                  title: Hostname
                  description: New hostname for the request
                path:
                  type: object
                  title: Path Rewrite
                  properties:
                    type:
                      type: string
                      title: Rewrite Type
                      enum:
                      - ReplaceFullPath
                      - ReplacePrefixMatch
                    replaceFullPath:
                      type: string
                      title: Replace Full Path
                      x-ui-visible-if:
                        field: spec.rules.{{this}}.url_rewrite.path.type
                        values:
                        - ReplaceFullPath
                    replacePrefixMatch:
                      type: string
                      title: Replace Prefix Match
                      x-ui-visible-if:
                        field: spec.rules.{{this}}.url_rewrite.path.type
                        values:
                        - ReplacePrefixMatch
            canary_deployment:
              type: object
              title: Canary Deployment
              description: Configure traffic splitting for canary deployments
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable Canary
                  default: false
                canary_service:
                  type: string
                  title: Canary Service Name
                  description: Name of the canary version service
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.canary_deployment.enabled
                    values:
                    - true
                canary_weight:
                  type: integer
                  title: Canary Traffic Percentage
                  description: Percentage of traffic to send to canary (0-100)
                  minimum: 0
                  maximum: 100
                  default: 10
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.canary_deployment.enabled
                    values:
                    - true
            rate_limiting:
              type: object
              title: Rate Limiting
              description: Configure per-route rate limiting
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable Rate Limiting
                  default: false
                requests_per_second:
                  type: integer
                  title: Requests Per Second
                  description: Maximum requests per second per client IP
                  minimum: 1
                  default: 100
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.rate_limiting.enabled
                    values:
                    - true
                burst:
                  type: integer
                  title: Burst Size
                  description: Maximum burst size above the rate
                  minimum: 0
                  default: 20
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.rate_limiting.enabled
                    values:
                    - true
            ip_whitelist:
              type: object
              title: IP Whitelist
              description: Restrict access to specific IP addresses
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable IP Whitelist
                  default: false
                allowed_ips:
                  type: array
                  title: Allowed IP Addresses
                  description: List of IP addresses or CIDR ranges
                  items:
                    type: string
                    pattern: ^(\d{1,3}\.){3}\d{1,3}(\/\d{1,2})?$
                    x-ui-placeholder: '192.168.1.0/24 or 10.0.0.5'
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.ip_whitelist.enabled
                    values:
                    - true
            cors:
              type: object
              title: CORS Configuration
              description: Configure Cross-Origin Resource Sharing
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable CORS
                  default: false
                allow_origins:
                  type: array
                  title: Allowed Origins
                  description: List of allowed origins (* for all)
                  items:
                    type: string
                  default:
                  - '*'
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                    - true
                allow_methods:
                  type: array
                  title: Allowed Methods
                  items:
                    type: string
                    enum:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - PATCH
                    - OPTIONS
                    - HEAD
                  default:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                    - true
                allow_headers:
                  type: array
                  title: Allowed Headers
                  items:
                    type: string
                  default:
                  - Content-Type
                  - Authorization
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                    - true
                allow_credentials:
                  type: boolean
                  title: Allow Credentials
                  default: false
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                    - true
                max_age:
                  type: integer
                  title: Preflight Cache Max Age
                  description: Seconds to cache preflight response
                  default: 86400
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                    - true
            grpc:
              type: object
              title: gRPC Configuration
              description: Configure gRPC routing
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable gRPC
                  default: false
                method_match:
                  type: array
                  title: gRPC Method Matching
                  items:
                    type: object
                    properties:
                      service:
                        type: string
                        title: Service Name
                        description: Protobuf service name
                      method:
                        type: string
                        title: Method Name
                        description: gRPC method name
                      type:
                        type: string
                        title: Match Type
                        enum:
                        - Exact
                        - RegularExpression
                        default: Exact
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.grpc.enabled
                    values:
                    - true
            websocket:
              type: object
              title: WebSocket Configuration
              description: Configure WebSocket support
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable WebSocket
                  default: false
                timeout:
                  type: string
                  title: WebSocket Timeout
                  description: Timeout for WebSocket connections (e.g., 3600s)
                  default: 3600s
                  pattern: ^\d+[smh]$
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.websocket.enabled
                    values:
                    - true
            load_balancing:
              type: object
              title: Load Balancing Configuration
              description: Configure load balancing algorithm
              x-ui-toggle: true
              properties:
                algorithm:
                  type: string
                  title: Algorithm
                  description: Load balancing algorithm
                  enum:
                  - round_robin
                  - least_conn
                  - ip_hash
                  - random
                  default: round_robin
          required:
          - service_name
          - port
          - path
          - path_type
    force_ssl_redirection:
      type: boolean
      title: Force SSL Redirection
      description: Force HTTP to HTTPS redirection
    pdb:
      type: object
      title: Pod Disruption Budget
      description: Configure Pod Disruption Budget
      x-ui-toggle: true
      properties:
        minAvailable:
          type: string
          title: Minimum Available
          description: Minimum number of pods available during disruption
          pattern: ^([1-9][0-9]*|([1-9][0-9]?|100)%)$
          x-ui-error-message: Value must be a positive integer or percentage
        maxUnavailable:
          type: string
          title: Maximum Unavailable
          description: Maximum number of pods unavailable during disruption
          pattern: ^([1-9][0-9]*|([1-9][0-9]?|100)%)$
          x-ui-error-message: Value must be a positive integer or percentage
    nginx_config:
      type: object
      title: NGINX Configuration
      description: Global NGINX configuration
      x-ui-toggle: true
      properties:
        proxy_timeouts:
          type: object
          title: Proxy Timeouts
          properties:
            connect:
              type: string
              title: Connect Timeout
              default: 60s
              pattern: ^\d+[smh]$
            send:
              type: string
              title: Send Timeout
              default: 60s
              pattern: ^\d+[smh]$
            read:
              type: string
              title: Read Timeout
              default: 60s
              pattern: ^\d+[smh]$
        body_size_limit:
          type: string
          title: Body Size Limit
          description: Maximum client request body size
          default: 1m
          pattern: ^\d+[kmg]?$
    security:
      type: object
      title: Security Configuration
      description: Configure security settings
      x-ui-toggle: true
      properties:
        tls_version:
          type: string
          title: Minimum TLS Version
          enum:
          - TLSv1.2
          - TLSv1.3
          default: TLSv1.2
        security_headers:
          type: object
          title: Security Headers
          description: Configure HTTP security headers
          properties:
            hsts_enabled:
              type: boolean
              title: Enable HSTS
              default: true
            hsts_max_age:
              type: integer
              title: HSTS Max Age
              description: Max age in seconds
              default: 31536000
            x_frame_options:
              type: string
              title: X-Frame-Options
              enum:
              - DENY
              - SAMEORIGIN
              default: DENY
            x_content_type_options:
              type: boolean
              title: X-Content-Type-Options
              default: true
            x_xss_protection:
              type: boolean
              title: X-XSS-Protection
              default: true
    observability:
      type: object
      title: Observability Configuration
      description: Configure monitoring and observability
      x-ui-toggle: true
      properties:
        metrics:
          type: object
          title: Metrics Configuration
          properties:
            enabled:
              type: boolean
              title: Enable Metrics
              default: true
            port:
              type: integer
              title: Metrics Port
              default: 9113
        tracing:
          type: object
          title: Tracing Configuration
          properties:
            enabled:
              type: boolean
              title: Enable Tracing
              default: false
            endpoint:
              type: string
              title: OpenTelemetry Endpoint
              x-ui-visible-if:
                field: spec.observability.tracing.enabled
                values:
                - true
            sampling_rate:
              type: number
              title: Sampling Rate
              minimum: 0
              maximum: 1
              default: 0.1
              x-ui-visible-if:
                field: spec.observability.tracing.enabled
                values:
                - true
        logging:
          type: object
          title: Logging Configuration
          properties:
            level:
              type: string
              title: Log Level
              enum:
              - debug
              - info
              - warn
              - error
              default: info
            format:
              type: string
              title: Log Format
              enum:
              - text
              - json
              default: json
    helm_chart_version:
      type: string
      title: Helm Chart Version
      description: Override the default NGINX Gateway Fabric Helm chart version (defaults to bundled 2.3.0)
      x-ui-placeholder: '2.3.0'
    helm_values:
      type: object
      title: Additional Helm Values
      description: Additional Helm values to merge with the default configuration
      x-ui-toggle: true
      x-ui-yaml-editor: true
    domain_prefix_override:
      type: string
      title: Domain Prefix Override
      description: Override the automatically generated domain prefix
      x-ui-toggle: true
    disable_endpoint_validation:
      type: boolean
      title: Disable Endpoint Validation
      description: Disable endpoint validation for cert-manager (uses DNS validation instead of HTTP)
      default: false
      x-ui-toggle: true
    renew_cert_before:
      type: string
      title: Certificate Renewal Time
      description: Renew TLS certificate before expiry (e.g., 720h for 30 days)
      default: 720h
      pattern: ^[0-9]+(h|m|s)$
      x-ui-placeholder: '720h'
      x-ui-toggle: true
    helm_wait:
      type: boolean
      title: Helm Wait
      description: Wait for all resources to be ready before marking the release as successful
      default: true
      x-ui-toggle: true
  required:
  - private
  - rules
  - force_ssl_redirection
  x-ui-order:
  - private
  - disable_base_domain
  - domains
  - rules
  - gateway_class_name
  - resources
  - pdb
  - nginx_config
  - security
  - observability
  - helm_chart_version
  - helm_values
  - domain_prefix_override
  - disable_endpoint_validation
  - renew_cert_before
  - helm_wait
  - force_ssl_redirection
outputs:
  default:
    type: '@facets/ingress'
    title: Ingress Details
sample:
  kind: ingress
  flavor: nginx_fabric
  version: '1.0'
  disabled: true
  metadata:
    annotations: {}
  spec:
    private: false
    basic_auth: false
    disable_base_domain: false
    rules: {}
    force_ssl_redirection: true
