intent: ack_acm_controller
flavor: standard
clouds:
  - aws
  - kubernetes
intentDetails:
  type: Operators
  description: AWS ACK ACM Controller for managing ACM certificates as Kubernetes resources
  displayName: ACK ACM Controller
  iconUrl: https://raw.githubusercontent.com/Facets-cloud/facets-modules-redesign/main/icons/ack_acm_controller.svg
description: |
  Deploys the AWS ACK ACM Controller on EKS clusters via Helm.
  This controller manages AWS Certificate Manager (ACM) certificates as Kubernetes resources
  and can export issued certificates to Kubernetes TLS secrets for use with Gateway API or Ingress.
  Uses IRSA for secure IAM authentication. Supports DNS validation via Route53.
inputs:
  cloud_account:
    description: The AWS Cloud Account for IAM and resource provisioning
    displayName: Cloud Account
    optional: false
    providers:
      - aws
    type: "@facets/aws_cloud_account"
  eks_details:
    description: The EKS cluster where the ACK ACM controller will be deployed
    displayName: EKS Cluster
    optional: false
    providers:
      - helm
      - kubernetes
    type: "@facets/eks"
  kubernetes_node_pool_details:
    description: Node pool for scheduling the controller pods
    displayName: Node Pool
    optional: true
    type: "@facets/kubernetes_nodepool"
outputs:
  default:
    title: ACK ACM Controller Details
    type: "@facets/ack_acm_controller"
sample:
  disabled: false
  flavor: standard
  kind: ack_acm_controller
  spec:
    chart_version: "1.3.4"
  version: "1.0"
spec:
  description: Configure the AWS ACK ACM Controller for your EKS cluster
  properties:
    chart_version:
      default: "1.3.4"
      description: Helm chart version of the ACK ACM Controller
      title: Chart Version
      type: string
    namespace:
      description: Kubernetes namespace for the controller (defaults to environment namespace)
      title: Namespace
      type: string
      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
      maxLength: 63
    helm_values:
      description: Additional Helm values to override defaults
      title: Helm Values
      type: object
      x-ui-yaml-editor: true
  required:
    - chart_version
  title: ACK ACM Controller Configuration
  type: object
  x-ui-order:
    - chart_version
    - namespace
    - helm_values
version: "1.0"
